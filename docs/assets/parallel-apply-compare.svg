<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1B2D"/>
      <stop offset="1" stop-color="#0B1730"/>
    </linearGradient>
    <style>
      .title { font: 700 18px Inter, Arial, sans-serif; fill: #E8EEF8; }
      .body { font: 400 13px Inter, Arial, sans-serif; fill: #9BB0CC; }
      .small { font: 600 12px Inter, Arial, sans-serif; fill: #C3D1E6; }
    </style>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg2)"/>
  <text x="60" y="58" class="title" style="font-size:28px;">Parallel apply: vanilla Terraform vs Kilolock</text>
  <text x="60" y="88" class="body" style="font-size:17px;">Same state, two engineers, different resources.</text>

  <rect x="60" y="130" width="500" height="350" rx="24" fill="#3A1C22" stroke="#6D313C"/>
  <text x="92" y="170" class="title">Vanilla Terraform HTTP backend</text>
  <text x="92" y="196" class="body">Whole-state lock decides everything.</text>
  <rect x="92" y="235" width="180" height="56" rx="18" fill="#0F1B2D" stroke="#465A78"/>
  <text x="118" y="268" class="small">Engineer A</text>
  <rect x="92" y="330" width="180" height="56" rx="18" fill="#0F1B2D" stroke="#465A78"/>
  <text x="118" y="363" class="small">Engineer B</text>
  <rect x="330" y="260" width="170" height="100" rx="20" fill="#652933"/>
  <text x="357" y="305" class="title">State lock</text>
  <text x="360" y="330" class="body">One wins</text>
  <path d="M272 263 H330" stroke="#FF9AA9" stroke-width="5"/>
  <path d="M272 358 H330" stroke="#FF9AA9" stroke-width="5"/>
  <text x="92" y="425" class="body">Result: even disjoint changes serialize through one coarse lock.</text>

  <rect x="640" y="130" width="500" height="350" rx="24" fill="#143627" stroke="#2F7258"/>
  <text x="672" y="170" class="title">Kilolock orchestrated apply</text>
  <text x="672" y="196" class="body">Reservations scope to touched resources.</text>
  <rect x="672" y="235" width="180" height="56" rx="18" fill="#0F1B2D" stroke="#465A78"/>
  <text x="698" y="268" class="small">Engineer A</text>
  <rect x="672" y="330" width="180" height="56" rx="18" fill="#0F1B2D" stroke="#465A78"/>
  <text x="698" y="363" class="small">Engineer B</text>
  <rect x="900" y="215" width="190" height="70" rx="18" fill="#1A4A37"/>
  <text x="930" y="245" class="title">Reservation A</text>
  <text x="930" y="268" class="body">resource set α</text>
  <rect x="900" y="315" width="190" height="70" rx="18" fill="#1A4A37"/>
  <text x="930" y="345" class="title">Reservation B</text>
  <text x="930" y="368" class="body">resource set β</text>
  <path d="M852 263 H900" stroke="#8DE7B6" stroke-width="5"/>
  <path d="M852 358 H900" stroke="#8DE7B6" stroke-width="5"/>
  <text x="672" y="425" class="body">Result: disjoint changes can proceed in parallel; overlapping changes conflict explicitly.</text>
</svg>
