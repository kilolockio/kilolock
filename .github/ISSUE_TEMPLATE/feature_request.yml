name: Feature request
description: Suggest an improvement for the OSS runtime, CLI, docs, or operator workflows.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. We especially value requests tied to large-state workflows, parallel work, queryability, repair, and self-hosted operability.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow pain or limitation are you hitting today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Kilolock to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or competing approaches you tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Scale, state size, team size, or operational constraints that make this important.
